services:
  - type: web
    name: rhetoriq
    runtime: node
    region: frankfurt
    nodeVersion: 20
    plan: starter   # must not be free — free tier spins down after 15min idle, causing 50s+ cold-start failures for real customers
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rhetoriq-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false   # set manually in Render dashboard
      - key: ADVISOR_EMAIL
        sync: false
      - key: ADVISOR_PASSWORD
        sync: false
      - key: ADVISOR_NAME
        value: Lorena Lienhard
      - key: NODE_ENV
        value: production
      - key: SENTRY_DSN
        sync: false   # set in Render dashboard — get DSN from sentry.io
      - key: STRIPE_SECRET_KEY
        sync: false   # set in Render dashboard — from Stripe dashboard
      - key: STRIPE_WEBHOOK_SECRET
        sync: false   # set in Render dashboard — from Stripe webhook settings
      - key: CORS_ORIGIN
        value: https://rhetoriq.ch
      - key: APP_URL
        value: https://rhetoriq.ch
      - key: COST_ALERT_THRESHOLD_USD
        value: "5"   # advisor gets an email if a single client crosses this in API costs on one day

databases:
  - name: rhetoriq-db
    databaseName: rhetoriq
    user: rhetoriq
    plan: starter   # Starter Postgres includes Render's own automatic daily
                    # backups (Dashboard -> rhetoriq-db -> Backups, with
                    # restore). The custom rhetoriq-backup cron job that used
                    # to run here was removed: it wrote pg_dump output to the
                    # cron container's own local disk, which is ephemeral and
                    # gets wiped after every run — every backup it ever made
                    # was destroyed immediately after logging "success". It
                    # never protected anything; this real, platform-level
                    # backup is the actual safety net.
    region: frankfurt
